name: E2E Tests

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: ev_charging
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: ev_charging
      DB_USER: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: ci-test-secret-not-for-production
      REDIS_HOST: localhost
      NODE_ENV: test
      DEMO_MODE: 'false'

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install backend deps
        run: cd backend && npm ci

      - name: Run migrations and seed
        run: cd backend && npm run migrate && npm run seed

      - name: Start backend
        run: cd backend && RATE_LIMIT_MAX=1000000 PORT=3001 node src/server.js &

      - name: Install frontend deps
        run: cd frontend && npm ci

      - name: Start frontend
        run: cd frontend && npm run dev &

      - name: Wait for services
        run: |
          timeout 30 bash -c 'until curl -s http://localhost:3001/api/health > /dev/null; do sleep 1; done'
          timeout 30 bash -c 'until curl -s http://localhost:3000 > /dev/null 2>&1; do sleep 1; done'

      - name: Install Playwright
        run: npm ci

      - name: Run E2E tests
        run: npm test
        env:
          API_URL: http://localhost:3001
          BASE_URL: http://localhost:3000

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
