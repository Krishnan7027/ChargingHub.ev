services:
  - type: web
    name: ev-charge-hub-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm run migrate && npm run seed && node src/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: CLIENT_URL
        sync: false
      - key: DEMO_MODE
        value: "true"
      - key: REDIS_HOST
        sync: false
      - key: REDIS_PORT
        sync: false
      - key: REDIS_PASSWORD
        sync: false
